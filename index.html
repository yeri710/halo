<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 뉴스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --text: #ffffff;
  --text-muted: #9ea7b4;
  --text-dim: #4e5968;
  --accent: #3182f6;
  --accent2: #f59e0b;
  --red: #f04452;
  --blue: #3182f6;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -200px; left: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(49,130,246,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-badge {
  background: var(--accent);
  color: #000;
  font-size: 10px;
  font-weight: 800;
  padding: 3px 7px;
  border-radius: 4px;
  letter-spacing: 0.05em;
}
.logo-text { font-size: 16px; font-weight: 700; }
.header-date { font-size: 12px; color: var(--text-muted); }

/* Hero */
.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 56px 24px 32px;
  position: relative;
  z-index: 1;
}
.hero-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: #3182f6;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.hero-label::before {
  content: '';
  display: block;
  width: 6px; height: 6px;
  background: #3182f6;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
}
.hero h1 span {
  background: linear-gradient(135deg, #3182f6, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub { font-size: 14px; color: var(--text-muted); }

/* Search */
.search-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 28px;
  position: relative;
  z-index: 1;
}
.search-box {
  display: flex;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 8px 8px 20px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus-within {
  border-color: rgba(49,130,246,0.5);
  box-shadow: 0 0 0 3px rgba(49,130,246,0.08);
}
.search-box input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.search-box input::placeholder { color: var(--text-dim); }
.search-btn {
  background: #3182f6;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.search-btn:hover { opacity: 0.85; }
.search-btn:active { transform: scale(0.97); }

/* Tags */
.tags {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 28px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  position: relative;
  z-index: 1;
}
.tag {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border);
  color: var(--text-muted);
  background: var(--surface);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.tag svg { flex-shrink: 0; }
.tag:hover { border-color: rgba(49,130,246,0.4); color: var(--text); }
.tag.active {
  background: rgba(49,130,246,0.15);
  border-color: rgba(49,130,246,0.5);
  color: #60a5fa;
}

/* Main */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 80px;
  position: relative;
  z-index: 1;
}

/* Ticker */
.ticker-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  padding: 12px 0;
  margin-bottom: 36px;
}
.ticker {
  display: flex;
  gap: 48px;
  animation: ticker 40s linear infinite;
  white-space: nowrap;
}
@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: color 0.15s;
  text-decoration: none;
}
.ticker-item:hover { color: var(--text); }
.ticker-badge {
  font-size: 10px;
  font-weight: 700;
  color: #f04452;
  background: rgba(240,68,82,0.12);
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
}
.ticker-item .name { color: var(--text); font-weight: 600; }
.ticker-item .up { color: var(--accent); }
.ticker-item .down { color: var(--red); }

/* Section */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.section-count { font-size: 12px; color: var(--text-dim); }

/* Featured card */
.featured-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 32px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s;
  text-decoration: none;
  display: block;
  position: relative;
  overflow: hidden;
}
.featured-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(180deg, #3182f6, #60a5fa);
}
.featured-card:hover {
  border-color: rgba(49,130,246,0.3);
  transform: translateY(-1px);
}
.featured-tag {
  font-size: 10px;
  font-weight: 700;
  color: #3182f6;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.featured-card h2 {
  font-size: clamp(17px, 2.5vw, 22px);
  font-weight: 700;
  line-height: 1.5;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 10px;
  word-break: keep-all;
}
.featured-card p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
  word-break: keep-all;
}
.card-footer {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
}
.card-source {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 4px;
}
.card-date { font-size: 11px; color: var(--text-dim); }
.card-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
.badge-up { background: rgba(49,130,246,0.12); color: #60a5fa; }
.badge-down { background: rgba(240,68,82,0.12); color: #f04452; }
.badge-hot { background: rgba(245,158,11,0.12); color: var(--accent2); }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 36px 0; }

/* News grid */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.news-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: fadeUp 0.4s ease both;
}
.news-card:hover {
  border-color: rgba(49,130,246,0.2);
  background: var(--surface2);
  transform: translateY(-2px);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.news-category {
  font-size: 10px;
  font-weight: 700;
  color: #3182f6;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.news-card h3 {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.55;
  color: var(--text);
  letter-spacing: -0.01em;
  word-break: keep-all;
  flex: 1;
}
.news-card p {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: keep-all;
}
.news-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.news-source { font-size: 10px; font-weight: 600; color: var(--text-dim); }
.news-date { font-size: 10px; color: var(--text-dim); }

/* Empty */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 0;
  color: var(--text-muted);
  font-size: 14px;
}

@media (max-width: 640px) {
  .hero { padding: 40px 20px 24px; }
  .featured-card { padding: 20px; }
  .news-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-badge">ECO</span>
      <span class="logo-text">경제 뉴스</span>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-label">실시간 업데이트</div>
  <h1>데일리 <span>경제 소식</span></h1>
  <p class="hero-sub">주요 경제 이슈를 한눈에 확인하세요</p>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="키워드로 뉴스 검색... (예: 삼성전자, 금리, 환율)" />
    <button class="search-btn" onclick="filterNews()">검색</button>
  </div>
</div>

<div class="tags">
  <div class="tag active" onclick="setTag('전체', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    전체
  </div>
  <div class="tag" onclick="setTag('주식', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    주식
  </div>
  <div class="tag" onclick="setTag('부동산', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    부동산
  </div>
  <div class="tag" onclick="setTag('환율', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><line x1="12" y1="6" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="18"/></svg>
    환율
  </div>
  <div class="tag" onclick="setTag('금리', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
    금리
  </div>
  <div class="tag" onclick="setTag('반도체', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 7V4M12 7V4M15 7V4M9 20v-3M12 20v-3M15 20v-3M4 9h3M4 12h3M4 15h3M17 9h3M17 12h3M17 15h3"/></svg>
    반도체
  </div>
  <div class="tag" onclick="setTag('물가', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    물가
  </div>
  <div class="tag" onclick="setTag('삼성전자', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18" stroke-width="3"/></svg>
    삼성전자
  </div>
  <div class="tag" onclick="setTag('하이닉스', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="12" rx="10" ry="4"/><path d="M2 12c0 4 4.5 7 10 7s10-3 10-7"/><path d="M2 12c0-4 4.5-7 10-7s10 3 10 7"/></svg>
    SK하이닉스
  </div>
  <div class="tag" onclick="setTag('현대차', this)">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17H3a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h11l5 5v5h-2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
    현대차
  </div>
</div>

<div class="main">

  <div class="ticker-wrap">
    <div class="ticker" id="newsTicker">
      <span class="ticker-item"><span class="ticker-badge">⚡ 속보</span> <span style="color:var(--text-dim)">헤드라인 불러오는 중...</span></span>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">헤드라인</div>
  </div>

  <a class="featured-card" href="#" target="_blank" id="headlineCard">
    <div class="featured-tag">🔥 오늘의 톱뉴스</div>
    <h2 id="headlineTitle">불러오는 중...</h2>
    <p id="headlineDesc"></p>
    <div class="card-footer">
      <span class="card-source" id="headlineSource"></span>
      <span class="card-date" id="headlineDate"></span>
      <span class="card-badge badge-hot">🔥 HOT</span>
    </div>
  </a>

  <div class="divider"></div>

  <div class="section-header">
    <div class="section-title">경제 뉴스</div>
    <div class="section-count" id="newsCount">10건</div>
  </div>

  <div class="news-grid" id="newsGrid"></div>
</div>

<script>
const now = new Date();
document.getElementById('headerDate').textContent =
  now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');

const tagKeywords = {
  '전체': '주식 경제',
  '주식': '주식 코스피',
  '부동산': '부동산 아파트',
  '환율': '환율 달러',
  '금리': '금리 한국은행',
  '반도체': '반도체 삼성전자',
  '물가': '물가 소비자물가',
  '삼성전자': '삼성전자 주가',
  '하이닉스': 'SK하이닉스 주가',
  '현대차': '현대차 주가'
};

let currentTag = '전체';
let currentQuery = '';
let currentKeyword = '주식 경제';
let currentStart = 1;
let isLoading = false;
let hasMore = true;
let totalLoaded = 0;

function stripHtml(html) {
  return html.replace(/<[^>]*>/g, '').replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
}

function timeAgo(dateStr) {
  try {
    const diff = Math.floor((new Date() - new Date(dateStr)) / 60000);
    if (diff < 1) return '방금 전';
    if (diff < 60) return diff + '분 전';
    if (diff < 1440) return Math.floor(diff/60) + '시간 전';
    return Math.floor(diff/1440) + '일 전';
  } catch { return ''; }
}

function createCard(item, i) {
  return `
    <a class="news-card" href="${item.link}" target="_blank" rel="noopener" style="animation-delay:${(i%20)*0.05}s">
      <div class="news-category">● 주식/경제</div>
      <h3>${stripHtml(item.title)}</h3>
      <p>${stripHtml(item.description)}</p>
      <div class="news-meta">
        <span class="news-source">네이버 뉴스</span>
        <span class="news-date">${timeAgo(item.pubDate)}</span>
      </div>
    </a>`;
}

function appendNews(items) {
  const grid = document.getElementById('newsGrid');
  // 로딩 스피너 항상 먼저 제거
  const spinner = document.getElementById('loadingSpinner');
  if (spinner) spinner.remove();

  if (!items.length && totalLoaded === 0) {
    grid.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.innerHTML = createCard(item, i);
    grid.appendChild(div.firstElementChild);
  });

  totalLoaded += items.length;
  document.getElementById('newsCount').textContent = totalLoaded + '건';

  if (items.length < 20) {
    hasMore = false;
    if (totalLoaded > 0) {
      const end = document.createElement('div');
      end.style.cssText = 'grid-column:1/-1;text-align:center;padding:30px 0;color:var(--text-dim);font-size:13px;';
      end.textContent = '모든 뉴스를 불러왔습니다.';
      grid.appendChild(end);
    }
  }
}

function showInitialLoading() {
  const grid = document.getElementById('newsGrid');
  grid.innerHTML = '';
}

function addLoadingSpinner() {
  const grid = document.getElementById('newsGrid');
  const existing = document.getElementById('loadingSpinner');
  if (existing) existing.remove();
  const spinner = document.createElement('div');
  spinner.id = 'loadingSpinner';
  spinner.style.cssText = 'grid-column:1/-1;text-align:center;padding:30px 0;color:var(--text-dim);font-size:13px;';
  spinner.innerHTML = '⏳ 불러오는 중...';
  grid.appendChild(spinner);
}

async function fetchNews(keyword, start = 1) {
  if (isLoading) return;
  isLoading = true;

  if (start > 1) addLoadingSpinner();

  try {
    const res = await fetch(`/api/news?query=${encodeURIComponent(keyword)}&start=${start}`);
    const data = await res.json();
    appendNews(data.items || []);
    currentStart = start + 20;
  } catch (e) {
    const grid = document.getElementById('newsGrid');
    const spinner = document.getElementById('loadingSpinner');
    if (spinner) spinner.remove();
    if (start === 1) grid.innerHTML = `<div class="empty">뉴스를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.</div>`;
  } finally {
    isLoading = false;
  }
}

function resetAndFetch(keyword) {
  currentKeyword = keyword;
  currentStart = 1;
  hasMore = true;
  totalLoaded = 0;
  document.getElementById('newsGrid').innerHTML = '';
  fetchNews(keyword, 1);
}

function setTag(tag, el) {
  currentTag = tag;
  currentQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  resetAndFetch(tagKeywords[tag] || tag);
}

function filterNews() {
  currentQuery = document.getElementById('searchInput').value.trim();
  if (!currentQuery) return;
  resetAndFetch(currentQuery);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') filterNews();
});

// 무한 스크롤 감지
window.addEventListener('scroll', () => {
  if (isLoading || !hasMore) return;
  const scrollBottom = window.innerHeight + window.scrollY;
  const docHeight = document.documentElement.scrollHeight;
  if (scrollBottom >= docHeight - 300) {
    fetchNews(currentKeyword, currentStart);
  }
});

// 초기 로드
resetAndFetch(tagKeywords['전체']);

// 헤드라인 로드 (관련도순 1위)
async function fetchHeadline() {
  try {
    const res = await fetch(`/api/news?query=${encodeURIComponent('주요 경제 주식')}&start=1`);
    const data = await res.json();
    const item = data.items && data.items[0];
    if (!item) return;
    document.getElementById('headlineCard').href = item.link;
    document.getElementById('headlineTitle').textContent = stripHtml(item.title);
    document.getElementById('headlineDesc').textContent = stripHtml(item.description);
    document.getElementById('headlineDate').textContent = timeAgo(item.pubDate);
    // 출처 파싱 (originallink 도메인)
    try {
      const domain = new URL(item.originallink || item.link).hostname.replace('www.', '');
      document.getElementById('headlineSource').textContent = domain;
    } catch { }
  } catch (e) {
    document.getElementById('headlineTitle').textContent = '헤드라인을 불러오지 못했습니다.';
  }
}
fetchHeadline();

// 속보 티커 로드
async function fetchTicker() {
  try {
    const res = await fetch(`/api/news?query=${encodeURIComponent('주식 경제 속보')}&start=1`);
    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch(e) {
      console.error('ticker JSON parse error');
      return;
    }
    const items = data.items || [];
    if (!items.length) return;

    const ticker = document.getElementById('newsTicker');
    const html = [...items, ...items].map(item =>
      `<a class="ticker-item" href="${item.link}" target="_blank" rel="noopener">
        <span class="ticker-badge">⚡ 속보</span>
        ${stripHtml(item.title)}
      </a>`
    ).join('');
    ticker.innerHTML = html;
  } catch (e) {
    console.error('ticker error', e);
  }
}
fetchTicker();
</script>
